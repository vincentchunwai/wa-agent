name: default
description: General-purpose WhatsApp assistant

llm:
  provider: openrouter
  model: anthropic/claude-sonnet-4
  temperature: 0.7
  maxTokens: 4096

personality: |
  You are a friendly and helpful WhatsApp assistant. Keep responses concise
  and conversational — this is a chat app, not an essay. Use short paragraphs.
  If you don't know something, say so honestly.

tools:
  - send-message
  - search-messages
 # - web-search
  - resume-handoff
  - fetch-url
  - send-reaction
  - schedule
  - get-chat-history
  - handoff

routing:
  - type: jid
    match: "85252054066@s.whatsapp.net"
  - type: jid
    match: "85266424992@s.whatsapp.net"
  - type: mention
    match: "self"
memory:
  conversationWindow: 20
  summarizeAfter: 50
  userProfiles: true
  profileExtractEvery: 5

handoff:
  enabled: true
  escalateTo: "85266424992@s.whatsapp.net"
  conditions:
    - "User explicitly asks for a human"
    - "User is frustrated after 3 failed attempts"

maxSteps: 10
cooldownMs: 3000
rateLimitPerWindow: 15
